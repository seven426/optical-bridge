<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpticalBridge Send v2</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #fff; color: #222; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
}
header { padding: 16px; text-align: center; }
header h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.5px; }
header p { font-size: 12px; color: #888; margin-top: 4px; }

.stage { display: none; width: 100%; max-width: 640px; padding: 20px; }
.stage.active { display: block; }
.stage-wide { display: none; width: 100%; max-width: 100%; padding: 12px 20px; }
.stage-wide.active { display: flex; gap: 16px; align-items: flex-start; height: calc(100vh - 60px); }
.stage-left { flex: 0 0 320px; display: flex; flex-direction: column; gap: 8px; max-height: 100%; }
.stage-right { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-width: 0; }
.stage-right .qr-container { width: 100%; }
.stage-right .qr-wrapper { width: 100%; padding: 8px; }
.stage-right .qr-wrapper canvas { max-width: 100%; height: auto; }

.drop-zone {
  border: 2px dashed #bbb; border-radius: 12px;
  padding: 48px 24px; text-align: center; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.drop-zone:hover, .drop-zone.drag-over { border-color: #4a9eff; background: rgba(74,158,255,0.05); }
.drop-zone .icon { font-size: 40px; margin-bottom: 12px; }
.drop-zone .label { font-size: 15px; color: #555; }
.drop-zone .hint { font-size: 12px; color: #999; margin-top: 8px; }
input[type=file] { display: none; }

.settings { margin-top: 16px; background: #f5f5f5; border-radius: 8px; overflow: hidden; border: 1px solid #e0e0e0; }
.settings-toggle {
  width: 100%; padding: 10px 16px; background: none; border: none; color: #555;
  font-size: 13px; cursor: pointer; text-align: left;
}
.settings-toggle:hover { color: #000; }
.settings-body { display: none; padding: 8px 16px 16px; }
.settings-body.open { display: block; }
.setting-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 0; font-size: 13px; border-bottom: 1px solid #e0e0e0;
}
.setting-row:last-child { border-bottom: none; }
.setting-row label { color: #555; }
.setting-row select { background: #fff; color: #222; border: 1px solid #ccc; border-radius: 4px; padding: 4px 8px; font-size: 13px; }

.file-info { background: #f5f5f5; border-radius: 8px; padding: 20px; border: 1px solid #e0e0e0; }
.file-info .row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 13px; border-bottom: 1px solid #e0e0e0; }
.file-info .row:last-child { border-bottom: none; }
.file-info .row .key { color: #888; }
.file-info .row .val { color: #222; font-family: monospace; font-size: 12px; }

.btn { display: block; width: 100%; margin-top: 16px; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
.btn:hover { opacity: 0.85; }
.btn-primary { background: #4a9eff; color: #fff; }
.btn-stop { background: #e53935; color: #fff; }
.btn-pause { background: #ff9800; color: #000; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.qr-container { display: flex; flex-direction: column; align-items: center; gap: 12px; }
.qr-wrapper { background: #fff; border-radius: 8px; padding: 16px; display: flex; align-items: center; justify-content: center; }
.qr-wrapper canvas, .qr-wrapper img { display: block; }

.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; }
.stat { background: #f5f5f5; border-radius: 6px; padding: 10px; text-align: center; border: 1px solid #e0e0e0; }
.stat .value { font-size: 20px; font-weight: 700; color: #4a9eff; }
.stat .label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }

.controls { display: flex; gap: 8px; width: 100%; margin-top: 8px; }
.controls .btn { flex: 1; margin-top: 0; font-size: 13px; padding: 10px; }

.mode-selector { display: flex; gap: 4px; background: #f5f5f5; border-radius: 6px; padding: 3px; margin-bottom: 12px; border: 1px solid #e0e0e0; }
.mode-btn { flex: 1; padding: 6px 12px; border: none; border-radius: 4px; background: transparent; color: #888; font-size: 12px; cursor: pointer; }
.mode-btn.active { background: #e0e0e0; color: #222; }
.select-input { width: 100%; padding: 8px 12px; background: #fff; border: 1px solid #ccc; border-radius: 6px; color: #222; font-family: monospace; font-size: 13px; margin-bottom: 8px; }
.select-info { font-size: 11px; color: #888; margin-bottom: 8px; }

.block-grid-wrap { margin-top: 4px; display: flex; flex-direction: column; }
.block-grid-canvas-wrap { overflow-y: auto; }
.block-grid-toolbar { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.block-grid-back { padding: 3px 10px; background: #eee; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; cursor: pointer; color: #555; }
.block-grid-back:hover { background: #ddd; }
.block-grid-info { flex: 1; font-size: 11px; color: #888; }
.block-grid-actions { display: flex; gap: 4px; }
.block-grid-act { padding: 3px 10px; background: #eee; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; cursor: pointer; color: #555; }
.block-grid-act:hover { background: #ddd; }
#blockGridCanvas { display: block; border: 1px solid #e0e0e0; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>
<header>
  <h1>OpticalBridge — Send</h1>
  <p>Air-gap file transfer via QR codes</p>
</header>

<div id="stage1" class="stage active">
  <div class="drop-zone" id="dropZone">
    <div class="icon">+</div>
    <div class="label">Drop file here or click to select</div>
    <div class="hint">Any file type, up to ~10 MB</div>
  </div>
  <input type="file" id="fileInput">
  <div class="settings">
    <button class="settings-toggle" id="settingsToggle">Settings</button>
    <div class="settings-body" id="settingsBody">
      <div class="setting-row">
        <label>Mode</label>
        <div class="mode-selector" id="senderMode" style="margin:0;border:none;background:none;padding:0;">
          <button class="mode-btn" data-mode="camera">Camera</button>
          <button class="mode-btn active" data-mode="colorgrid">ColorGrid</button>
          <button class="mode-btn" data-mode="c4grid">C4Grid</button>
        </div>
      </div>
      <div class="setting-row">
        <label>Frame interval</label>
        <select id="optInterval">
          <option value="25">25 ms</option>
          <option value="33">33 ms</option>
          <option value="50">50 ms</option>
          <option value="66">66 ms</option>
          <option value="80">80 ms</option>
          <option value="100">100 ms</option>
          <option value="150" selected>150 ms</option>
          <option value="200">200 ms</option>
          <option value="300">300 ms</option>
          <option value="500">500 ms</option>
        </select>
      </div>
      <div class="setting-row">
        <label>QR version</label>
        <select id="optQRVersion">
          <option value="0">Auto</option>
          <option value="10" selected>V10 (57x57, ~270B)</option>
          <option value="12">V12 (65x65, ~400B)</option>
          <option value="15">V15 (73x73, ~640B)</option>
          <option value="18">V18 (89x89, ~710B)</option>
          <option value="20">V20 (97x97, ~850B)</option>
          <option value="23">V23 (109x109, ~1090B)</option>
          <option value="25">V25 (117x117, ~1270B)</option>
        </select>
      </div>
      <div class="setting-row">
        <label>FEC (K data + N parity)</label>
        <select id="optFEC">
          <option value="4,1">K=4, N=1 (25%)</option>
          <option value="5,1" selected>K=5, N=1 (20%)</option>
          <option value="5,2">K=5, N=2 (40%)</option>
          <option value="7,3">K=7, N=3 (43%)</option>
        </select>
      </div>
      <div class="setting-row">
        <label>QR error correction</label>
        <select id="optECLevel">
          <option value="L" selected>L (~7%)</option>
          <option value="M">M (~15%)</option>
          <option value="Q">Q (~25%)</option>
        </select>
      </div>
    </div>
  </div>
</div>

<div id="stage2" class="stage">
  <div class="file-info" id="fileInfo"></div>
  <button class="btn btn-primary" id="btnStart">Start Transmission</button>
  <button class="btn" style="background:#999;color:#fff;" id="btnBack">Back</button>
</div>

<div id="stage3" class="stage-wide">
  <div class="stage-left">
    <div style="margin-bottom:4px;">
      <div style="font-size:16px;font-weight:600;">OpticalBridge — Send</div>
      <div id="shaDisplay" style="font-size:10px;word-break:break-all;color:#888;font-family:monospace;margin-top:4px;"></div>
    </div>
    <div class="mode-selector" id="modeSelector">
      <button class="mode-btn" data-mode="select">Frames</button>
      <button class="mode-btn active" data-mode="blocks">Blocks</button>
    </div>
    <input class="select-input" id="selectInput" placeholder="Frame range: 42,87,120-125" style="display:none;">
    <div class="select-info" id="selectInfo" style="display:none;"></div>
    <input class="select-input" id="blockInput" placeholder="Block range: 0,3-5" style="display:none;">
    <div class="select-info" id="blockInfo" style="display:none;"></div>
    <div class="block-grid-wrap" id="blockGridWrap" style="display:none;">
      <div class="block-grid-toolbar">
        <button class="block-grid-back" id="blockGridBack" style="display:none;">&larr; Back</button>
        <span class="block-grid-info" id="blockGridInfo">Selected: 0 / 0</span>
        <div class="block-grid-actions">
          <button class="block-grid-act" id="blockGridAll">All</button>
          <button class="block-grid-act" id="blockGridInv">Invert</button>
        </div>
      </div>
      <div class="block-grid-canvas-wrap" id="blockGridCanvasWrap">
        <canvas id="blockGridCanvas" style="width:100%;"></canvas>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="value" id="statTotal">-</div><div class="label">Total</div></div>
      <div class="stat"><div class="value" id="statSent">0</div><div class="label">Sent</div></div>
      <div class="stat"><div class="value" id="statFPS">0.0</div><div class="label">FPS</div></div>
      <div class="stat"><div class="value" id="statElapsed">00:00</div><div class="label">Elapsed</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#888;margin-top:4px;">
      <span>Interval:</span>
      <select id="optIntervalLive" style="background:#fff;color:#222;border:1px solid #ccc;border-radius:4px;padding:2px 6px;font-size:12px;">
        <option value="25">25 ms</option>
        <option value="33" selected>33 ms</option>
        <option value="50">50 ms</option>
        <option value="66">66 ms</option>
        <option value="80">80 ms</option>
        <option value="100">100 ms</option>
        <option value="150">150 ms</option>
        <option value="200">200 ms</option>
        <option value="300">300 ms</option>
        <option value="500">500 ms</option>
      </select>
    </div>
    <div class="controls">
      <button class="btn btn-pause" id="btnPause">Pause</button>
      <button class="btn btn-stop" id="btnStop">Stop</button>
    </div>
    <label style="font-size:12px;color:#888;cursor:pointer;user-select:none;">
      <input type="checkbox" id="chkSelfTest" style="vertical-align:middle;margin-right:4px;">Self-test
    </label>
    <div id="diag" style="padding:8px;background:#f5f5f5;border-radius:6px;font-family:monospace;font-size:11px;color:#888;text-align:left;display:none;max-height:200px;overflow-y:auto;word-break:break-all;"></div>
  </div>
  <div class="stage-right">
    <div class="qr-container">
      <div class="qr-wrapper" id="qrWrapper"></div>
    </div>
  </div>
</div>

<script src="lib/gf256.js"></script>
<script src="lib/frame-protocol.js"></script>
<script src="lib/reed-solomon.js"></script>
<script src="lib/frame-range.js"></script>
<script src="lib/sha256.js"></script>
<script src="lib/colorgrid.js"></script>
<script src="lib/c4grid.js"></script>
<script src="lib/sender.js"></script>
<script src="lib/qrcode.js"></script>
<script src="lib/jsQR.js"></script>
<script>
(function() {
  var stage1 = document.getElementById('stage1');
  var stage2 = document.getElementById('stage2');
  var stage3 = document.getElementById('stage3');
  var dropZone = document.getElementById('dropZone');
  var fileInput = document.getElementById('fileInput');
  var fileInfo = document.getElementById('fileInfo');
  var btnStart = document.getElementById('btnStart');
  var btnBack = document.getElementById('btnBack');
  var btnPause = document.getElementById('btnPause');
  var btnStop = document.getElementById('btnStop');
  var qrWrapper = document.getElementById('qrWrapper');
  var settingsToggle = document.getElementById('settingsToggle');
  var settingsBody = document.getElementById('settingsBody');
  var selectInput = document.getElementById('selectInput');
  var selectInfo = document.getElementById('selectInfo');
  var blockInput = document.getElementById('blockInput');
  var blockInfo = document.getElementById('blockInfo');
  var modeSelector = document.getElementById('modeSelector');

  var timer = null;
  var paused = false;
  var cycleFrameIdx = 0;
  var elapsedSec = 0;
  var totalFramesSent = 0;
  var recentSendTimes = [];
  var elapsedTimer = null;
  var cycleFrames = null;
  var activeInterval = 150;
  var selfTestTick = 0;
  var selfTestSkipCount = 0;
  var selfTestOk = 0;
  var selfTestFail = 0;
  var selfTestFailLog = [];
  var qrCode = null;

  var pageHeader = document.querySelector('header');

  function showStage(n) {
    stage1.classList.toggle('active', n === 1);
    stage2.classList.toggle('active', n === 2);
    stage3.classList.toggle('active', n === 3);
    if (pageHeader) pageHeader.style.display = n === 3 ? 'none' : '';
  }

  dropZone.addEventListener('click', function() { fileInput.click(); });
  dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('drag-over'); });
  dropZone.addEventListener('drop', function(e) {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    var f = e.dataTransfer.files[0];
    if (f) prepareAndShow(f);
  });
  fileInput.addEventListener('change', function() {
    var f = fileInput.files[0];
    if (f) prepareAndShow(f);
  });

  settingsToggle.addEventListener('click', function() { settingsBody.classList.toggle('open'); });

  var senderMode = 'colorgrid';

  var modeDefaults = {
    camera:    { interval: 150, qrVersion: 10, fec: '5,1' },
    colorgrid: { interval: 25,  qrVersion: 0,  fec: '5,2' },
    c4grid:    { interval: 25,  qrVersion: 0,  fec: '5,2' }
  };

  function applyModeDefaults(mode) {
    senderMode = mode;
    var d = modeDefaults[mode];
    document.getElementById('optInterval').value = String(d.interval);
    document.getElementById('optQRVersion').value = String(d.qrVersion);
    document.getElementById('optFEC').value = d.fec;
    var isGrid = mode === 'colorgrid' || mode === 'c4grid';
    document.getElementById('optQRVersion').parentNode.style.display = isGrid ? 'none' : '';
    document.getElementById('optECLevel').parentNode.style.display = isGrid ? 'none' : '';
    // Sync live interval slider in stage3
    var liveSel = document.getElementById('optIntervalLive');
    if (liveSel) liveSel.value = String(d.interval);
  }

  applyModeDefaults('colorgrid');

  document.getElementById('senderMode').addEventListener('click', function(e) {
    if (!e.target.classList.contains('mode-btn')) return;
    var buttons = document.getElementById('senderMode').querySelectorAll('.mode-btn');
    for (var i = 0; i < buttons.length; i++) buttons[i].classList.remove('active');
    e.target.classList.add('active');
    applyModeDefaults(e.target.dataset.mode);
  });

  function getSettings() {
    var qrVer = parseInt(document.getElementById('optQRVersion').value) || Sender.pickQRVersion();
    var fecParts = document.getElementById('optFEC').value.split(',');
    return {
      frameInterval: parseInt(document.getElementById('optInterval').value),
      qrVersion: qrVer,
      fecK: parseInt(fecParts[0]),
      fecN: parseInt(fecParts[1]),
      ecLevel: document.getElementById('optECLevel').value,
      mode: senderMode,
      cellPx: (senderMode === 'colorgrid' || senderMode === 'c4grid') ? 6 : 0
    };
  }

  async function prepareAndShow(file) {
    try {
      var settings = getSettings();
      var info = await Sender.prepareFile(file, settings);

      fileInfo.innerHTML =
        '<div class="row"><span class="key">Size</span><span class="val">' + formatSize(info.fileSize) + '</span></div>' +
        '<div class="row"><span class="key">SHA-256</span><span class="val" style="font-size:10px;word-break:break-all;">' + info.sha256hex + '</span></div>' +
        '<div class="row"><span class="key">Frames</span><span class="val">' + info.totalDataFrames + ' data + FEC = ' + info.totalFrames + ' total</span></div>' +
        '<div class="row"><span class="key">QR</span><span class="val">V' + info.qrVersion + ', EC-' + info.ecLevel + '</span></div>' +
        '<div class="row"><span class="key">FEC</span><span class="val">K=' + info.fecK + ', N=' + info.fecN + '</span></div>' +
        '<div class="row"><span class="key">Est. time</span><span class="val">~' + info.estimatedSeconds + 's</span></div>';

      Sender.generateFrames();
      showStage(2);
    } catch (err) {
      alert('Error: ' + err.message);
    }
  }

  btnBack.addEventListener('click', function() { fileInput.value = ''; showStage(1); });

  btnStart.addEventListener('click', startTransmission);
  btnStop.addEventListener('click', stopTransmission);
  btnPause.addEventListener('click', togglePause);

  modeSelector.addEventListener('click', function(e) {
    if (!e.target.classList.contains('mode-btn')) return;
    var buttons = modeSelector.querySelectorAll('.mode-btn');
    for (var i = 0; i < buttons.length; i++) buttons[i].classList.remove('active');
    e.target.classList.add('active');
    var mode = e.target.dataset.mode;
    if (mode === 'select') {
      selectInput.style.display = 'block';
      selectInfo.style.display = 'block';
      blockInput.style.display = 'none';
      blockInfo.style.display = 'none';
      blockGridWrap.style.display = 'none';
      Sender.setSelectMode(new Set());
    } else {
      selectInput.style.display = 'none';
      selectInfo.style.display = 'none';
      blockInput.style.display = 'none';
      blockInfo.style.display = 'none';
      blockGridWrap.style.display = '';
      initBlockGrid();
      updateBlockGridInfo();
    }
    cycleFrames = Sender.getCycleFrames();
    cycleFrameIdx = 0;
  });

  selectInput.addEventListener('input', function() {
    var state = Sender.getState();
    var maxFrame = state ? state.totalFrames : undefined;
    var selSet = FrameRange.parse(selectInput.value, maxFrame);
    Sender.setSelectMode(selSet);
    cycleFrames = Sender.getCycleFrames();
    cycleFrameIdx = 0;
    selectInfo.textContent = selSet.size + ' frames selected';
  });

  blockInput.addEventListener('input', function() {
    var state = Sender.getState();
    var fecK = state ? state.fecK : 0;
    var totalBlocks = state ? state.totalFECBlocks : 0;
    var blkSet = FrameRange.parse(blockInput.value, totalBlocks);
    Sender.setBlockMode(blkSet);
    cycleFrames = Sender.getCycleFrames();
    cycleFrameIdx = 0;
    blockInfo.textContent = blkSet.size + ' blocks selected';
  });

  // === Block Grid ===
  var blockGridCanvas = document.getElementById('blockGridCanvas');
  var blockGridCtx = blockGridCanvas.getContext('2d');
  var blockGridWrap = document.getElementById('blockGridWrap');
  var blockGridBack = document.getElementById('blockGridBack');
  var blockGridInfo = document.getElementById('blockGridInfo');
  var blockGridAll = document.getElementById('blockGridAll');
  var blockGridInv = document.getElementById('blockGridInv');

  var blockGrid = {
    selected: null,
    currentGroup: null,
    hover: null,
    totalBlocks: 0,
    groupSize: 100,
    cellW: 0, cellH: 0, gap: 3, cols: 4,
    dpr: 1
  };
  var blockGridMouseDown = null;

  function initBlockGrid() {
    var state = Sender.getState();
    if (!state || !state.totalFECBlocks) return;
    blockGrid.totalBlocks = state.totalFECBlocks;
    blockGrid.selected = new Set();
    for (var i = 0; i < blockGrid.totalBlocks; i++) blockGrid.selected.add(i);
    blockGrid.currentGroup = null;
    blockGrid.hover = null;
    applyBlockSelection();
    resizeBlockGrid();
    drawBlockGrid();
  }

  function resizeBlockGrid() {
    var dpr = window.devicePixelRatio || 1;
    blockGrid.dpr = dpr;
    var w = blockGridWrap.clientWidth - 2;
    var gap = 3;
    var cols = Math.max(3, Math.floor((w + gap) / 75));
    var cellW = Math.floor((w - (cols + 1) * gap) / cols);
    var cellH = Math.floor(cellW * 0.6);
    blockGrid.gap = gap;
    blockGrid.cellW = cellW;
    blockGrid.cellH = cellH;
    blockGrid.cols = cols;

    var canvasH;
    if (blockGrid.currentGroup === null) {
      var groups = Math.ceil(blockGrid.totalBlocks / blockGrid.groupSize);
      var rows = Math.ceil(groups / blockGrid.cols);
      canvasH = Math.max(60, rows * (cellH + gap) + gap);
    } else {
      var sc = Math.floor((w - 9) / 10);
      canvasH = 10 * sc + 9;
    }
    // Canvas area fixed to second-level 10×10 size; first level scrolls within
    var blockGridCanvasWrap = document.getElementById('blockGridCanvasWrap');
    if (blockGridCanvasWrap) {
      var sc2 = Math.floor((w - 9) / 10);
      blockGridCanvasWrap.style.maxHeight = (10 * sc2 + 9) + 'px';
    }

    blockGridCanvas.width = Math.floor(w * dpr);
    blockGridCanvas.height = Math.floor(canvasH * dpr);
    blockGridCanvas.style.height = canvasH + 'px';
  }

  function drawBlockGrid() {
    var ctx = blockGridCtx;
    var dpr = blockGrid.dpr;
    var w = blockGridCanvas.width / dpr;
    ctx.save();
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, w, blockGridCanvas.height / dpr);
    if (blockGrid.currentGroup === null) {
      drawTopLevel(ctx, w);
    } else {
      drawSecondLevel(ctx, w);
    }
    ctx.restore();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }

  function drawTopLevel(ctx, w) {
    var gs = blockGrid.groupSize;
    var groups = Math.ceil(blockGrid.totalBlocks / gs);
    var cw = blockGrid.cellW, ch = blockGrid.cellH, gap = blockGrid.gap;
    var cols = blockGrid.cols;
    var rr = 5; // corner radius

    for (var g = 0; g < groups; g++) {
      var row = Math.floor(g / cols);
      var col = g % cols;
      var x = gap + col * (cw + gap);
      var y = gap + row * (ch + gap);
      var start = g * gs;
      var end = Math.min(start + gs - 1, blockGrid.totalBlocks - 1);

      var selCount = 0;
      for (var b = start; b <= end; b++) { if (blockGrid.selected.has(b)) selCount++; }
      var total = end - start + 1;

      ctx.save();
      roundRect(ctx, x, y, cw, ch, rr);
      ctx.clip();

      if (selCount === total) {
        ctx.fillStyle = '#4a9eff';
        ctx.fillRect(x, y, cw, ch);
      } else if (selCount === 0) {
        ctx.fillStyle = '#e8e8e8';
        ctx.fillRect(x, y, cw, ch);
      } else {
        ctx.fillStyle = '#e8e8e8';
        ctx.fillRect(x, y, cw, ch);
        var ratio = selCount / total;
        ctx.fillStyle = '#4a9eff';
        ctx.fillRect(x, y, cw, ch * ratio);

      ctx.strokeStyle = '#ccc';
      ctx.lineWidth = 1;
      roundRect(ctx, x, y, cw, ch, rr);

        ctx.lineWidth = 2;
        roundRect(ctx, x + 1, y + 1, cw - 2, ch - 2, rr - 1);
        ctx.stroke();
        ctx.lineWidth = 1;

        var xr = 14;
        var xx = x + cw - xr - 4;
        var xy = y + (ch - xr) / 2;
        ctx.fillStyle = blockGrid.hover.onX ? '#e53935' : '#999';
        ctx.beginPath();
        ctx.arc(xx + xr/2, xy + xr/2, xr/2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('✕', xx + xr/2, xy + xr/2);
      }

      ctx.fillStyle = selCount === 0 ? '#666' : '#fff';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(start + '-' + end, x + cw/2, y + ch/2);
    }
  }

  function drawSecondLevel(ctx, w) {
    var group = blockGrid.currentGroup;
    var start = group * blockGrid.groupSize;
    var end = Math.min(start + blockGrid.groupSize - 1, blockGrid.totalBlocks - 1);
    var count = end - start + 1;

    var sc = Math.floor((w - 9) / 10);
    var gap = 1;
    var rr = Math.max(2, Math.floor(sc * 0.15));

    for (var i = 0; i < count; i++) {
      var row = Math.floor(i / 10);
      var col = i % 10;
      var x = col * (sc + gap);
      var y = row * (sc + gap);
      var bid = start + i;

      ctx.fillStyle = blockGrid.selected.has(bid) ? '#4a9eff' : '#e8e8e8';
      roundRect(ctx, x, y, sc, sc, rr);
      ctx.fill();

      ctx.strokeStyle = '#bbb';
      ctx.lineWidth = 0.5;
      roundRect(ctx, x, y, sc, sc, rr);
      ctx.stroke();

      var isHover = blockGrid.hover && blockGrid.hover.row === row && blockGrid.hover.col === col;
      if (isHover) {
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 1.5;
        roundRect(ctx, x + 0.5, y + 0.5, sc - 1, sc - 1, Math.max(1, rr - 0.5));
        ctx.stroke();
      }

      if (sc >= 18 && i % 5 === 0) {
        ctx.fillStyle = blockGrid.selected.has(bid) ? '#fff' : '#666';
        ctx.font = '8px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(String(bid), x + sc/2, y + sc/2);
      }
    }
  }

  function getBlockGridCell(ex, ey) {
    var w = blockGridCanvas.width / blockGrid.dpr;

    if (blockGrid.currentGroup === null) {
      var cw = blockGrid.cellW, ch = blockGrid.cellH, gap = blockGrid.gap;
      var cols = blockGrid.cols;
      var groups = Math.ceil(blockGrid.totalBlocks / blockGrid.groupSize);
      for (var g = 0; g < groups; g++) {
        var row = Math.floor(g / cols);
        var c = g % cols;
        var cx = gap + c * (cw + gap);
        var cy = gap + row * (ch + gap);
        if (ex >= cx && ex <= cx + cw && ey >= cy && ey <= cy + ch) {
          var onX = false;
          var xr = 14;
          var xx = cx + cw - xr - 4;
          var xy = cy + (ch - xr) / 2;
          var dx = ex - (xx + xr/2);
          var dy = ey - (xy + xr/2);

          return { group: g, row: row, col: c, onX: onX };

      var gap = 1;
      var col = Math.floor(ex / (sc + gap));
      var row = Math.floor(ey / (sc + gap));

      var end = Math.min(start + blockGrid.groupSize - 1, blockGrid.totalBlocks - 1);
      var idx = row * 10 + col;
      if (idx >= 0 && idx < (end - start + 1)) {
        var cx = col * (sc + gap);
        var cy = row * (sc + gap);

  function handleBlockGridMouseDown(e) {

    var ey = e.clientY - rect.top;

  function handleBlockGridMouseUp(e) {
    var rect = blockGridCanvas.getBoundingClientRect();
    var ex = e.clientX - rect.left;
    var ey = e.clientY - rect.top;
    var cell = getBlockGridCell(ex, ey);
    if (!cell || !blockGridMouseDown) { blockGridMouseDown = null; return; }

    if (blockGrid.currentGroup === null) {
      // Top level
      if (blockGridMouseDown.group === cell.group) {
        if (cell.onX) {
          // Clicked X button — deselect group
          var start = cell.group * blockGrid.groupSize;
          var end = Math.min(start + blockGrid.groupSize - 1, blockGrid.totalBlocks - 1);
          for (var b = start; b <= end; b++) blockGrid.selected.delete(b);
          applyBlockSelection();
          drawBlockGrid();
          updateBlockGridInfo();
        } else {
          // Enter second level
          blockGrid.currentGroup = cell.group;
          blockGridBack.style.display = '';
          resizeBlockGrid();
          drawBlockGrid();
          updateBlockGridInfo();
        }
      }
    } else {
      // Second level: range toggle between mousedown and mouseup cells
      var start = blockGrid.currentGroup * blockGrid.groupSize;
      var end = Math.min(start + blockGrid.groupSize - 1, blockGrid.totalBlocks - 1);
      var count = end - start + 1;
      var row1 = Math.min(blockGridMouseDown.row, cell.row);
      var row2 = Math.max(blockGridMouseDown.row, cell.row);
      var col1 = Math.min(blockGridMouseDown.col, cell.col);
      var col2 = Math.max(blockGridMouseDown.col, cell.col);
      for (var r = row1; r <= row2; r++) {
        for (var c = col1; c <= col2; c++) {
          var idx = r * 10 + c;
          if (idx < count) {
            var bid = start + idx;
            if (blockGrid.selected.has(bid)) blockGrid.selected.delete(bid);
            else blockGrid.selected.add(bid);
          }
        }
      }
      drawBlockGrid();
      updateBlockGridInfo();
    }
    blockGridMouseDown = null;
  }

  function handleBlockGridMove(e) {
    var rect = blockGridCanvas.getBoundingClientRect();
    var ex = e.clientX - rect.left;
    var ey = e.clientY - rect.top;
    var cell = getBlockGridCell(ex, ey);
    if (!cell) {
      if (blockGrid.hover) { blockGrid.hover = null; drawBlockGrid(); }
      return;
    }
    var prev = blockGrid.hover;
    if (!prev || prev.row !== cell.row || prev.col !== cell.col || prev.onX !== cell.onX) {
      blockGrid.hover = cell;
      blockGridCanvas.style.cursor = cell.onX ? 'pointer' : 'pointer';
      drawBlockGrid();
    }
  }

  function handleBlockGridLeave() {
    if (blockGrid.hover) { blockGrid.hover = null; drawBlockGrid(); }
  }

  function applyBlockSelection() {
    Sender.setBlockMode(blockGrid.selected);
    cycleFrames = Sender.getCycleFrames();
    cycleFrameIdx = 0;
  }

  function updateBlockGridInfo() {
    blockGridInfo.textContent = 'Selected: ' + blockGrid.selected.size + ' / ' + blockGrid.totalBlocks;
  }

  blockGridCanvas.addEventListener('mousedown', handleBlockGridMouseDown);
  blockGridCanvas.addEventListener('mouseup', handleBlockGridMouseUp);

  blockGridInv.addEventListener('click', function() {

  function startTransmission() {

  function stopTransmission() {

  function togglePause() {

  function startDisplay() {
    var state = Sender.getState();
    elapsedSec = 0;

    document.getElementById('shaDisplay').textContent = 'SHA-256: ' + state.sha256hex;

      document.getElementById('statElapsed').textContent = m + ':' + s;
      // Recent 5-second FPS
      var now = Date.now(), cutoff = now - 5000;

  function shuffleCycle() {

      var tmp = cycleFrames[i];
      cycleFrames[i] = cycleFrames[j];
      cycleFrames[j] = tmp;

  function showFrame() {

      if (!selfTestEnabled) {

      }
      if (selfTestEnabled) {
        if (!selfTestSkipCount) {

        }

                if (!match && frame.length === recovered.length) {
                  for (var bi = 0; bi < frame.length; bi++) {
                    if (frame[bi] !== recovered[bi]) {
                      diag.innerHTML += ' first diff at byte[' + bi + ']: ' + frame[bi].toString(16) + ' vs ' + recovered[bi].toString(16);
                      break;
                    }
                  }
                }
              }
              } // close if (!innerSkip)
            } else if (senderMode === 'colorgrid' || senderMode === 'c4grid') {
              // Decode returned null — accumulate failure
              selfTestFail++;
              var hexHead = '', hexTail = '';
              for (var hi = 0; hi < Math.min(10, frame.length); hi++) {
                hexHead += ('00' + frame[hi].toString(16)).slice(-2);
              }
              for (var ti = Math.max(0, frame.length - 10); ti < frame.length; ti++) {
                hexTail += ('00' + frame[ti].toString(16)).slice(-2);
              }
              var entry = '#' + (selfTestOk + selfTestFail) + ' NULL: ' + hexHead + '...' + hexTail;
              if (rgDebug) {
                entry += ' rowHits=' + rgDebug.rowHits + ' cand=' + rgDebug.candidates + ' finders=' + rgDebug.finderCount;
                if (rgDebug.error) entry += ' err=' + rgDebug.error;
              }
              selfTestFailLog.push(entry);
              diag.style.display = 'block';
              var status2 = 'Self-test: ' + selfTestOk + ' OK, ' + selfTestFail + ' FAIL';
              if (selfTestFailLog.length > 0) {
                status2 += '\n' + selfTestFailLog.join('\n');
              }
              diag.innerHTML = status2.replace(/\n/g, '<br>');
              diag.style.color = '#f44336';
            } else {
              diag.innerHTML = 'DIAG FAIL: jsQR could not decode QR from canvas';
              diag.style.color = '#f44336';
            }
          }
        } catch (e) {
          diag.style.display = 'block';
          diag.innerHTML = 'DIAG ERR: ' + e.message;
          diag.style.color = '#f44336';
        }
      }
      }

      totalFramesSent++;
      recentSendTimes.push(Date.now());
      document.getElementById('statSent').textContent = totalFramesSent;
      cycleFrameIdx++;
      if (cycleFrameIdx >= cycleFrames.length) {
        cycleFrameIdx = 0;
      }
      scheduleNextFrame();
    } catch (e) {
      console.error('showFrame error:', e);
      totalFramesSent++;
      recentSendTimes.push(Date.now());
      document.getElementById('statSent').textContent = totalFramesSent;
      cycleFrameIdx++;
      if (cycleFrameIdx >= cycleFrames.length) {
        cycleFrameIdx = 0;
      }
      scheduleNextFrame();
    }
  }

  function esc(s) {
    var el = document.createElement('span');
    el.textContent = s;
    return el.innerHTML;
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(2) + ' MB';
  }
})();
</script>
