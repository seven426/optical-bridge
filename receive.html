<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpticalBridge — Receive</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #0d0d0d; color: #e0e0e0; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
}
header { padding: 16px; text-align: center; }
header h1 { font-size: 20px; font-weight: 600; }
header p { font-size: 12px; color: #888; margin-top: 4px; }

.main { width: 100%; max-width: 640px; padding: 16px; }

.camera-container { position: relative; border-radius: 8px; overflow: hidden; background: #000; }
video { display: block; width: 100%; }
.reticle {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 60%; height: 60%; border: 2px solid rgba(74,158,255,0.6); border-radius: 8px;
  pointer-events: none;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.3);
}
.indicator {
  position: absolute; top: 16px; right: 16px;
  width: 12px; height: 12px; border-radius: 50%; background: #888;
  transition: background 0.15s;
}
.indicator.success { background: #4caf50; }
.indicator.fail { background: #f44336; }

.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 16px; }
.stat { background: #1a1a1a; border-radius: 6px; padding: 10px; text-align: center; }
.stat .value { font-size: 20px; font-weight: 700; color: #4caf50; }
.stat .label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }

.heatmap-container { margin-top: 16px; }
.heatmap-container h3 { font-size: 13px; color: #888; margin-bottom: 6px; }
.heatmap {
  display: flex; flex-wrap: wrap; gap: 2px; max-height: 120px; overflow-y: auto;
  background: #111; border-radius: 4px; padding: 4px;
}
.heatmap-cell {
  width: 10px; height: 10px; border-radius: 1px; flex-shrink: 0;
  background: #333;
}
.heatmap-cell.received { background: #4caf50; }
.heatmap-cell.parity { background: #2196f3; }
.heatmap-cell.missing { background: #f44336; }

.missing-section { margin-top: 16px; }
.missing-section h3 { font-size: 13px; color: #888; margin-bottom: 6px; }
.missing-frames {
  background: #1a1a1a; border-radius: 6px; padding: 10px;
  font-family: monospace; font-size: 12px; word-break: break-all;
  user-select: all; color: #f44336;
}

.btn {
  width: 100%; margin-top: 12px; padding: 12px; border: none; border-radius: 8px;
  font-size: 15px; font-weight: 600; cursor: pointer;
}
.btn-primary { background: #4caf50; color: #fff; }
.btn-primary:hover { opacity: 0.85; }

.download-section { margin-top: 16px; background: #1a1a1a; border-radius: 8px; padding: 20px; text-align: center; display: none; }
.download-section.show { display: block; }
.download-section .status { font-size: 14px; margin-bottom: 8px; }
.download-section .status.ok { color: #4caf50; }
.download-section .status.warn { color: #ff9800; }
</style>
</head>
<body>
<header>
  <h1>OpticalBridge — Receive</h1>
  <p>Point camera at sender's screen</p>
</header>

<div class="main">
  <div id="cameraSection">
    <div class="camera-container">
      <video id="video" autoplay playsinline></video>
      <div class="reticle" style="display:none;"></div>
      <div class="indicator" id="indicator"></div>
    </div>
    <div class="mode-selector" id="receiverMode" style="display:flex;gap:4px;background:#1a1a1a;border-radius:6px;padding:3px;margin-bottom:8px;border:1px solid #333;">
      <button class="mode-btn" data-mode="camera" style="flex:1;padding:6px 12px;border:none;border-radius:4px;background:transparent;color:#888;font-size:12px;cursor:pointer;">Camera</button>
      <button class="mode-btn active" data-mode="screen" style="flex:1;padding:6px 12px;border:none;border-radius:4px;background:#555;color:#e0e0e0;font-size:12px;cursor:pointer;">Screen-QR</button>
      <button class="mode-btn" data-mode="rawgrid" style="flex:1;padding:6px 12px;border:none;border-radius:4px;background:transparent;color:#888;font-size:12px;cursor:pointer;">RawGrid</button>
    </div>
    <button class="btn btn-primary" id="btnStart">Start Screen Capture</button>
  </div>

  <div class="stats" id="statsSection" style="display:none;">
    <div class="stat"><div class="value" id="statReceived">0</div><div class="label">Frames</div></div>
    <div class="stat"><div class="value" id="statBlocks">0/0</div><div class="label">Blocks ready</div></div>
    <div class="stat"><div class="value" id="statRecovered">0</div><div class="label">Recovered</div></div>
    <div class="stat"><div class="value" id="statMissing">-</div><div class="label">Missing</div></div>
  </div>

  <div id="diagSection" style="display:none;margin-top:8px;padding:6px 10px;background:#1a1a1a;border-radius:6px;font-family:monospace;font-size:11px;color:#888;text-align:center;"></div>

  <div id="rgStatus" style="display:none;margin-top:8px;padding:6px 10px;background:#1a1a1a;border-radius:6px;font-family:monospace;font-size:11px;color:#ff9800;text-align:center;"></div>

  <div class="heatmap-container" id="heatmapSection" style="display:none;">
    <h3>Frame Map (green=data, blue=parity, red=missing)</h3>
    <div class="heatmap" id="heatmap"></div>
  </div>

  <div class="missing-section" id="recentSection" style="display:none;">
    <h3>Recent Frames <span style="font-weight:400;font-size:11px;color:#888;">(last 20 recognized IDs)</span></h3>
    <div class="missing-frames" id="recentFrames" style="color:#4caf50;"></div>
  </div>

  <div class="missing-section" id="missingSection" style="display:none;">
    <h3>Missing Frames (copy to tell sender)</h3>
    <div class="missing-frames" id="missingFrames"></div>
  </div>

  <div class="missing-section" id="missingBlocksSection" style="display:none;">
    <h3>Missing Blocks (copy to tell sender)</h3>
    <div class="missing-frames" id="missingBlocks" style="color:#ff9800;"></div>
  </div>

  <div class="download-section" id="downloadSection">
    <div class="status" id="downloadStatus"></div>
    <div id="sha256Display" style="font-size:10px;word-break:break-all;color:#888;margin:8px 0;display:none;"></div>
    <input id="filenameInput" placeholder="Enter filename to save as" style="display:none;width:100%;padding:8px;background:#fff;border:1px solid #ccc;border-radius:6px;font-size:13px;margin-bottom:8px;">
    <button class="btn btn-primary" id="btnDownload" style="display:none;">Download File</button>
  </div>
</div>

<script src="lib/gf256.js"></script>
<script src="lib/frame-protocol.js"></script>
<script src="lib/reed-solomon.js"></script>
<script src="lib/frame-range.js"></script>
<script src="lib/sha256.js"></script>
<script src="lib/rawgrid.js"></script>
<script src="lib/receiver.js"></script>
<script src="lib/jsQR.js"></script>
<script>
(function() {
  var video = document.getElementById('video');
  var indicator = document.getElementById('indicator');
  var btnStart = document.getElementById('btnStart');
  var heatmap = document.getElementById('heatmap');
  var missingFramesEl = document.getElementById('missingFrames');
  var downloadSection = document.getElementById('downloadSection');
  var downloadStatus = document.getElementById('downloadStatus');
  var btnDownload = document.getElementById('btnDownload');

  var scanning = false;
  var scanTimer = null;
  var completeFile = null;
  var receiverMode = 'screen';
  var firstFrameTime = null;
  var transferFileSize = null;

  // Mode toggle
  document.getElementById('receiverMode').addEventListener('click', function(e) {
    if (!e.target.classList.contains('mode-btn')) return;
    var buttons = document.getElementById('receiverMode').querySelectorAll('.mode-btn');
    for (var i = 0; i < buttons.length; i++) {
      buttons[i].classList.remove('active');
      buttons[i].style.background = 'transparent';
      buttons[i].style.color = '#888';
    }
    e.target.classList.add('active');
    e.target.style.background = '#555';
    e.target.style.color = '#e0e0e0';
    receiverMode = e.target.dataset.mode;
    var label = receiverMode === 'rawgrid' ? 'Start RawGrid' : receiverMode === 'screen' ? 'Start Screen Capture' : 'Start Camera';
    btnStart.textContent = label;
    // Show/hide reticle (only for camera mode)
    document.querySelector('.reticle').style.display = receiverMode === 'camera' ? '' : 'none';
  });

  btnStart.addEventListener('click', function() {
    if (receiverMode === 'rawgrid') startScreenCapture();
    else if (receiverMode === 'screen') startScreenCapture();
    else startCamera();
  });

  async function startCamera() {
    try {
      var stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
      });
      video.srcObject = stream;
      btnStart.style.display = 'none';
      document.getElementById('statsSection').style.display = 'grid';
      document.getElementById('rgStatus').style.display = 'block';
      document.getElementById('heatmapSection').style.display = 'block';
      document.getElementById('recentSection').style.display = 'block';
      document.getElementById('missingSection').style.display = 'block';
      document.getElementById('missingBlocksSection').style.display = 'block';
      document.getElementById('diagSection').style.display = 'block';

      firstFrameTime = null;
      transferFileSize = null;
      Receiver.init();
      startScanning(false);  // camera mode: throttle, downscale
    } catch (err) {
      alert('Camera access denied. Please allow camera permissions and try again.\n\n' + err.message);
    }
  }

  async function startScreenCapture() {
    try {
      var stream = await navigator.mediaDevices.getDisplayMedia({
        video: { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 60 } }
      });
      video.srcObject = stream;
      btnStart.style.display = 'none';
      document.getElementById('statsSection').style.display = 'grid';
      document.getElementById('rgStatus').style.display = 'block';
      document.getElementById('heatmapSection').style.display = 'block';
      document.getElementById('recentSection').style.display = 'block';
      document.getElementById('missingSection').style.display = 'block';
      document.getElementById('missingBlocksSection').style.display = 'block';
      document.getElementById('diagSection').style.display = 'block';

      // Handle user stopping screen share
      stream.getVideoTracks()[0].addEventListener('ended', function() {
        stopScanning();
        video.srcObject = null;
        btnStart.style.display = 'block';
        document.getElementById('statsSection').style.display = 'none';
        document.getElementById('rgStatus').style.display = 'none';
        document.getElementById('heatmapSection').style.display = 'none';
        document.getElementById('recentSection').style.display = 'none';
        document.getElementById('missingSection').style.display = 'none';
        document.getElementById('missingBlocksSection').style.display = 'none';
        document.getElementById('diagSection').style.display = 'none';
        document.getElementById('downloadSection').classList.remove('show');
      });

      firstFrameTime = null;
      transferFileSize = null;
      Receiver.init();
      startScanning(true);  // screen mode: full rate, less downscale
    } catch (err) {
      alert('Screen capture denied or cancelled.\n\n' + err.message);
    }
  }

  function startScanning(screenMode) {
    scanning = true;
    var canvas = document.createElement('canvas');
    var ctx = canvas.getContext('2d', { willReadFrequently: true });
    ctx.imageSmoothingEnabled = false;  // nearest-neighbor: preserves sharp cell edges after downscale
    var SCAN_INTERVAL_MS = screenMode ? 50 : 150;
    var MAX_SCAN_DIM = screenMode ? 960 : 640;
    var totalScanAttempts = 0;
    var qrDetected = 0;
    var qrWithData = 0;
    var lastDiagUpdate = 0;
    var lastScanTime = 0;
    var lastScanDuration = 0;
    var qrRegion = null;       // {x,y,w,h} crop region in scan coords, set after first decode
    var cropMissCount = 0;     // consecutive crop failures, reset region after several
    var seenHashes = {};       // pixel hash -> true, to skip duplicate jsQR decodes
    var hashHits = 0;          // count of jsQR skips due to hash match

    function pixelHash(data) {
      // Sample from middle and scattered positions — avoids false matches
      // when top-left corner is static across frames
      var h = data.length;
      var step = Math.max(1, Math.floor(data.length / 256));
      for (var i = 0; i < data.length; i += step) {
        h = ((h << 5) - h + data[i]) | 0;
      }
      return h;
    }

    function saveCropRegion(loc, imgW, imgH) {
      // Compute bounding box from QR corner points, add 15% padding
      var pts = [loc.topLeftCorner, loc.topRightCorner, loc.bottomRightCorner, loc.bottomLeftCorner];
      if (!pts[0] || !pts[0].x) return;
      var minX = imgW, maxX = 0, minY = imgH, maxY = 0;
      for (var p = 0; p < pts.length; p++) {
        if (pts[p].x < minX) minX = pts[p].x;
        if (pts[p].x > maxX) maxX = pts[p].x;
        if (pts[p].y < minY) minY = pts[p].y;
        if (pts[p].y > maxY) maxY = pts[p].y;
      }
      var padX = Math.max((maxX - minX) * 0.15, 15);
      var padY = Math.max((maxY - minY) * 0.15, 15);
      qrRegion = {
        x: Math.max(0, Math.floor(minX - padX)),
        y: Math.max(0, Math.floor(minY - padY)),
        w: Math.min(imgW, Math.ceil(maxX - minX + padX * 2)),
        h: Math.min(imgH, Math.ceil(maxY - minY + padY * 2))
      };
    }

    function scan(now) {
      if (!scanning) return;

      // Time-based throttle: ensures consistent scan rate even when jsQR is slow
      if (now - lastScanTime < SCAN_INTERVAL_MS) {
        scanTimer = requestAnimationFrame(scan);
        return;
      }
      lastScanTime = now;

      if (video.readyState >= video.HAVE_CURRENT_DATA && video.videoWidth > 0) {
        var scanStart = Date.now();

        // Downscale for jsQR performance (MAX_SCAN_DIM set by mode)
        var scaleX = Math.min(1, MAX_SCAN_DIM / video.videoWidth);
        var scaleY = Math.min(1, MAX_SCAN_DIM / video.videoHeight);
        var scale = Math.min(scaleX, scaleY);
        var scanW = Math.floor(video.videoWidth * scale);
        var scanH = Math.floor(video.videoHeight * scale);

        if (canvas.width !== scanW || canvas.height !== scanH) {
          canvas.width = scanW;
          canvas.height = scanH;
          ctx.imageSmoothingEnabled = false;  // reset after canvas resize clears context
        }
        ctx.drawImage(video, 0, 0, scanW, scanH);

        try {
          var imageData, qrData, usedCrop = false;

          // Crop scan: if region is known, only scan that area (much faster)
          if (qrRegion) {
            var regionW = Math.min(qrRegion.w, scanW - qrRegion.x);
            var regionH = Math.min(qrRegion.h, scanH - qrRegion.y);
            if (regionW > 0 && regionH > 0) {
              imageData = ctx.getImageData(qrRegion.x, qrRegion.y, regionW, regionH);
              var ph = pixelHash(imageData.data);
              if (seenHashes[ph]) {
                hashHits++;
                qrData = null;  // duplicate pixel data, skip jsQR
              } else if (receiverMode === 'rawgrid') {
                var rawBytes = RawGrid.decode(imageData.data, imageData.width, imageData.height);
                qrData = rawBytes ? { binaryData: rawBytes } : null;
              } else {
                qrData = jsQR(imageData.data, imageData.width, imageData.height);
              }
              usedCrop = true;
            }
          }

          // Full scan fallback: no region yet, or crop scan missed
          if (!qrData) {
            if (usedCrop) cropMissCount++; else cropMissCount = 0;
            if (cropMissCount >= 5) { qrRegion = null; cropMissCount = 0; }
            imageData = ctx.getImageData(0, 0, scanW, scanH);
            var fph = pixelHash(imageData.data);
            if (!seenHashes[fph]) {
              if (receiverMode === 'rawgrid') {
                var rb = RawGrid.decode(imageData.data, imageData.width, imageData.height);
                qrData = rb ? { binaryData: rb } : null;
              } else {
                qrData = jsQR(imageData.data, imageData.width, imageData.height);
              }
            } else {
              hashHits++;
              qrData = null;
            }
          } else {
            cropMissCount = 0;
            // Cache pixel hash to skip jsQR on duplicate frames
            if (imageData) seenHashes[pixelHash(imageData.data)] = true;
          }
          totalScanAttempts++;

        if (qrData && qrData.binaryData && qrData.binaryData.length > 0) {
          qrDetected++;
          qrWithData++;

          // Lock crop region for subsequent scans
          if (!qrRegion && screenMode) {
            if (qrData.location) {
              saveCropRegion(qrData.location, scanW, scanH);
            } else if (receiverMode === 'rawgrid') {
              // RawGrid: locate grid to set crop region for subsequent scans
              var gridLoc = RawGrid.locateGrid(imageData.data, imageData.width, imageData.height);
              if (gridLoc) {
                var estGridPx = gridLoc.cellPx * 130; // generous estimate for grid size
                var pad = Math.max(gridLoc.cellPx * 4, 15);
                qrRegion = {
                  x: Math.max(0, gridLoc.x - pad),
                  y: Math.max(0, gridLoc.y - pad),
                  w: Math.min(scanW - gridLoc.x + pad, estGridPx + pad * 2),
                  h: Math.min(scanH - gridLoc.y + pad, estGridPx + pad * 2)
                };
              }
            }
          }

          var frameBytes = new Uint8Array(qrData.binaryData);

          var result = Receiver.ingestFrameBinary(frameBytes);

          var ingestResult = result.status;
          if (result.status === 'new') {
            handleResult(result);
          } else if (result.status === 'processing') {
            updateUI();
            showProcessing();
            var promise = Receiver.getProcessingPromise();
            if (promise) {
              promise.then(function(r) {
                r.status = 'complete';
                handleResult(r);
              });
            }
          } else if (result.status === 'complete') {
            handleResult(result);
          } else if (result.status === 'bad') {
            flashIndicator('fail');
          }
          // Store for diagnostic display
          window._lastIngest = { status: ingestResult, len: frameBytes.length, mode: receiverMode };
          // Update rawgrid status immediately
          if (receiverMode === 'rawgrid') {
            var rgEl = document.getElementById('rgStatus');
            rgEl.textContent = 'RawGrid: decoded ' + frameBytes.length + 'B | ingest: ' + ingestResult;
            rgEl.style.color = ingestResult === 'new' ? '#4caf50' : ingestResult === 'bad' ? '#f44336' : '#ff9800';
          }
        } else if (qrData) {
          qrDetected++;
        }

        lastScanDuration = Date.now() - scanStart;

        // Update rawgrid status every scan
        if (receiverMode === 'rawgrid' && (!qrData || !qrData.binaryData || qrData.binaryData.length === 0)) {
          var rgEl = document.getElementById('rgStatus');
          // Try locateGrid directly
          var testGrids = RawGrid.locateGrid(imageData.data, imageData.width, imageData.height);
          var info = 'scan ' + totalScanAttempts + ' | grids: ';
          if (testGrids && testGrids.length > 0) {
            info += testGrids.length + ' best: cp=' + testGrids[0].cellPx + ' gs=' + testGrids[0].gridSize;
            var testDec = RawGrid.decode(imageData.data, imageData.width, imageData.height);
            if (testDec) {
              var ddv = new DataView(testDec.buffer, testDec.byteOffset, testDec.byteLength);
              info += ' dec:' + testDec.length + 'B m=' + ddv.getUint16(0,false).toString(16);
            } else { info += ' dec:null'; }
          } else { info += '0'; }
          info += ' img:' + imageData.width + 'x' + Math.floor(imageData.data.length/4/imageData.width);
          rgEl.textContent = info;
          rgEl.style.color = testGrids && testGrids.length > 0 ? '#ff9800' : '#888';
        }

        // Update diagnostic every 5 scans
        if (totalScanAttempts - lastDiagUpdate >= 5) {
          lastDiagUpdate = totalScanAttempts;
          var diagEl = document.getElementById('diagSection');
          var elapsedStr = '';
          if (firstFrameTime) {
            var secs = Math.floor((Date.now() - firstFrameTime) / 1000);
            var mins = Math.floor(secs / 60);
            var remainSecs = secs % 60;
            elapsedStr = ' | elapsed:' + mins + 'm' + remainSecs + 's';
          }
          var lastMs = lastScanDuration ? lastScanDuration + 'ms' : '?';
          var ingestInfo = '';
          if (window._lastIngest) {
            ingestInfo = ' | ingest:' + window._lastIngest.status + ' len:' + window._lastIngest.len;
          }
          diagEl.textContent = 'Scans:' + totalScanAttempts + ' | QR found:' + qrDetected + ' | data:' + qrWithData +
            ' | skip:' + hashHits + ingestInfo +
            ' | video:' + video.videoWidth + 'x' + video.videoHeight + ' scan:' + scanW + 'x' + scanH +
            ' dur:' + lastMs + elapsedStr;
        }

        } catch (e) {
          // jsQR or imageData may fail on some frames; skip and continue
        }
      }

      scanTimer = requestAnimationFrame(scan);
    }

    scanTimer = requestAnimationFrame(scan);
  }

  var recentIds = [];

  function handleResult(result) {
    if (result.status === 'new') {
      flashIndicator('success');
      // Record first frame time for speed measurement
      if (!firstFrameTime) {
        firstFrameTime = Date.now();
        var stats = Receiver.getStats();
        transferFileSize = result.totalExpected ? null : null; // actual file size unknown until complete
        document.getElementById('diagSection').textContent += ' | started';
      }
      // Track recent frame ID
      if (result.frameIdx !== undefined) {
        recentIds.push(result.frameIdx);
        if (recentIds.length > 20) recentIds.shift();
      }
    } else if (result.status === 'complete') {
      flashIndicator('success');
      completeFile = result;
      // Calculate transfer speed
      if (firstFrameTime) {
        var elapsed = (Date.now() - firstFrameTime) / 1000;
        result.elapsedSeconds = elapsed;
        result.speedBps = elapsed > 0 ? Math.round(result.fileSize / elapsed) : 0;
      }
      showDownload(result);
      stopScanning();
    }
    updateUI();
  }

  function flashIndicator(type) {
    indicator.classList.add(type);
    setTimeout(function() { indicator.classList.remove(type); }, 150);
  }

  function stopScanning() {
    scanning = false;
    if (scanTimer) {
      cancelAnimationFrame(scanTimer);
      scanTimer = null;
    }
  }

  var uiUpdateTick = 0;
  function updateUI() {
    uiUpdateTick++;
    // Only update stats every tick; heatmap every 5th tick to reduce DOM churn
    var updateHeatmap = (uiUpdateTick % 5 === 0);

    var stats = Receiver.getStats();

    var displayExpected = stats.expectedWithParity || stats.expected || '?';
    document.getElementById('statReceived').textContent = stats.received + '/' + displayExpected;
    document.getElementById('statBlocks').textContent = stats.blocksReady + '/' + stats.totalBlocks;
    document.getElementById('statRecovered').textContent = stats.blocksReady;

    // Recent frame IDs
    document.getElementById('recentFrames').textContent = recentIds.join(', ') || '(none)';

    var missing = Receiver.getMissingFrames();
    document.getElementById('statMissing').textContent = missing.size;
    missingFramesEl.textContent = FrameRange.format(missing) || '(none)';

    var missingBlocks = Receiver.getMissingBlocks();
    document.getElementById('missingBlocks').textContent = FrameRange.format(missingBlocks) || '(none)';

    // Heatmap - include parity frames (throttled)
    if (updateHeatmap) {
      var totalDisplay = stats.expectedWithParity || stats.expected;
      if (totalDisplay) {
        var html = '';
        for (var i = 0; i < totalDisplay; i++) {
          var isParity = stats.expected && i >= stats.expected;
          var cls = missing.has(i) ? 'missing' : (isParity ? 'parity' : 'received');
          var title = 'Frame ' + i + (isParity ? ' (parity)' : '');
          html += '<span class="heatmap-cell ' + cls + '" title="' + title + '"></span>';
        }
        heatmap.innerHTML = html;
      }
    }

    if (stats.complete) {
      document.getElementById('missingSection').style.display = 'none';
      document.getElementById('missingBlocksSection').style.display = 'none';
    }
  }

  function showProcessing() {
    downloadSection.classList.add('show');
    downloadStatus.className = 'status';
    downloadStatus.textContent = 'All frames received. Verifying SHA-256...';
    btnDownload.style.display = 'none';
  }

  function showDownload(result) {
    downloadSection.classList.add('show');
    downloadStatus.className = 'status ok';

    // Build speed info
    var speedInfo = '';
    if (result.elapsedSeconds !== undefined && result.speedBps !== undefined) {
      var speedKBps = (result.speedBps / 1024).toFixed(1);
      speedInfo = ' | ' + result.elapsedSeconds.toFixed(1) + 's | ' + speedKBps + ' KB/s';
    }
    downloadStatus.textContent = 'File ready — compare SHA-256 with sender' + speedInfo;

    // Show SHA-256
    var shaDiv = document.getElementById('sha256Display');
    shaDiv.style.display = 'block';
    shaDiv.textContent = 'SHA-256: ' + (result.sha256hex || '');

    // Show filename input
    var fnInput = document.getElementById('filenameInput');
    fnInput.style.display = 'block';

    btnDownload.style.display = 'block';
    btnDownload.onclick = function() {
      var filename = fnInput.value.trim() || 'received_file';
      var blob = new Blob([result.bytes], { type: 'application/octet-stream' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    };
  }
})();
</script>
</body>
</html>
