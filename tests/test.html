<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OpticalBridge Tests</title>
<style>
body { font-family: monospace; max-width: 900px; margin: 20px auto; background: #111; color: #eee; }
.pass { color: #4caf50; } .fail { color: #f44336; }
.result { margin: 4px 0; padding: 4px 8px; border-radius: 3px; }
</style>
</head>
<body>
<h1>OpticalBridge Tests</h1>
<div id="results"></div>

<script src="../lib/gf256.js"></script>
<script src="../lib/frame-protocol.js"></script>
<script src="../lib/reed-solomon.js"></script>
<script src="../lib/frame-range.js"></script>
<script src="../lib/sender.js"></script>
<script src="../lib/receiver.js"></script>
<script>
const results = document.getElementById('results');
let passed = 0, failed = 0;

function assert(cond, name) {
  const el = document.createElement('div');
  el.className = 'result';
  if (cond) { passed++; el.innerHTML = '<span class="pass">PASS</span> ' + name; }
  else { failed++; el.innerHTML = '<span class="fail">FAIL</span> ' + name; }
  results.appendChild(el);
}

// GF256 tests
assert(GF256.add(0x53, 0xCA) === 0x99, 'GF256 add');
assert(GF256.mul(0x57, 0x83) === 0x31, 'GF256 mul known value');
assert(GF256.mul(0x00, 0xFF) === 0x00, 'GF256 mul by zero');
assert(GF256.mul(0x01, 0xAB) === 0xAB, 'GF256 mul by one');
assert(GF256.div(0x31, 0x83) === 0x57, 'GF256 div');
assert(GF256.inverse(0x02) === 0x8E, 'GF256 inverse of 2');
assert(GF256.pow(0x02, 0) === 0x01, 'GF256 pow zero');
assert(GF256.pow(0x02, 7) === 0x80, 'GF256 pow of generator');

// Roundtrip: mul then div
for (let i = 1; i < 256; i++) {
  const inv = GF256.inverse(i);
  assert(GF256.mul(i, inv) === 1, 'GF256 inverse roundtrip ' + i);
}
</script>
<script>
const summary = document.createElement('div');
summary.style.marginTop = '16px';
summary.style.fontWeight = 'bold';
summary.textContent = `${passed} passed, ${failed} failed, ${passed + failed} total`;
results.appendChild(summary);
</script>
</body>
</html>
